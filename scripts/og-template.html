<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;600;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1200px; height: 630px; }
  body {
    font-family: "Inter", -apple-system, "Segoe UI", Roboto, sans-serif;
    color: #fff;
    overflow: hidden;
  }
  .card {
    position: relative;
    width: 1200px;
    height: 630px;
    padding: 76px 80px;
    display: flex;
    flex-direction: column;
    background:
      radial-gradient(820px 480px at 84% 6%, rgba(120,134,255,0.32), rgba(120,134,255,0) 60%),
      radial-gradient(820px 660px at 4% 104%, rgba(11,21,66,0.85), rgba(11,21,66,0) 62%),
      linear-gradient(150deg, #402DF3 0%, #211A86 50%, #0B1542 100%);
    isolation: isolate;
  }
  /* faint dot grid texture */
  .card::before {
    content: "";
    position: absolute;
    inset: 0;
    background-image: radial-gradient(rgba(255,255,255,0.10) 1.5px, transparent 1.5px);
    background-size: 34px 34px;
    -webkit-mask-image: linear-gradient(135deg, rgba(0,0,0,0.5), rgba(0,0,0,0) 70%);
            mask-image: linear-gradient(135deg, rgba(0,0,0,0.5), rgba(0,0,0,0) 70%);
    z-index: 0;
  }
  /* faint SQL terminal watermark — bottom-right, fades toward the headline */
  .term {
    position: absolute;
    right: 64px;
    bottom: 132px;
    font-family: "JetBrains Mono", ui-monospace, "SF Mono", Menlo, monospace;
    font-size: 25px;
    line-height: 1.62;
    white-space: pre;
    text-align: left;
    color: rgba(206,214,255,0.20);
    -webkit-mask-image: linear-gradient(112deg, transparent 0%, #000 50%, #000 100%);
            mask-image: linear-gradient(112deg, transparent 0%, #000 50%, #000 100%);
    z-index: 0;
    pointer-events: none;
  }
  .term .dots { letter-spacing: 6px; color: rgba(206,214,255,0.28); }
  .term .kw { color: rgba(140,162,255,0.62); font-weight: 600; }
  .term .pr { color: rgba(150,176,255,0.72); }
  .term .st { color: rgba(150,230,185,0.52); }
  .term .ok { color: rgba(130,235,175,0.55); }
  .top {
    position: relative;
    z-index: 1;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .logo { height: 60px; width: auto; display: block; }
  .eyebrow {
    display: inline-flex;
    align-items: center;
    padding: 11px 24px;
    border: 1.5px solid rgba(255,255,255,0.40);
    border-radius: 999px;
    background: rgba(255,255,255,0.10);
    font-size: 22px;
    font-weight: 600;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.95);
    white-space: nowrap;
  }
  .eyebrow.hidden { display: none; }
  .content {
    position: relative;
    z-index: 1;
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding-bottom: 8px;
  }
  .headline {
    font-size: 78px;
    font-weight: 800;
    line-height: 1.04;
    letter-spacing: -2px;
    max-width: 1000px;
    text-wrap: balance;
  }
  .headline.small { font-size: 64px; }
  .subtitle {
    margin-top: 28px;
    font-size: 30px;
    font-weight: 500;
    line-height: 1.36;
    color: rgba(255,255,255,0.80);
    max-width: 840px;
  }
  .subtitle.hidden { display: none; }
  .foot {
    position: relative;
    z-index: 1;
    display: flex;
    align-items: center;
    gap: 14px;
    font-size: 26px;
    font-weight: 600;
    color: rgba(255,255,255,0.92);
  }
  .foot .dot { width: 9px; height: 9px; border-radius: 50%; background: rgba(255,255,255,0.6); }
  .foot .tag { font-weight: 500; color: rgba(255,255,255,0.6); }
</style>
</head>

  <script>
    const p = new URLSearchParams(location.search);
    const eyebrow = (p.get("eyebrow") || "").trim();
    const title = (p.get("title") || "").trim();
    const subtitle = (p.get("subtitle") || "").trim();
    const tag = (p.get("tag") || "").trim();

    const ebEl = document.getElementById("eyebrow");
    if (eyebrow) ebEl.textContent = eyebrow; else ebEl.classList.add("hidden");

    const hEl = document.getElementById("headline");
    hEl.textContent = title;
    if (title.length > 46) hEl.classList.add("small");

    const sEl = document.getElementById("subtitle");
    if (subtitle) sEl.textContent = subtitle; else sEl.classList.add("hidden");

    if (tag) document.getElementById("tag").textContent = tag;

    window.__ogReady = false;
    (document.fonts ? document.fonts.ready : Promise.resolve()).then(() => {
      window.__ogReady = true;
    });
  </script>
